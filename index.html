<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="icon" href="1.jpg" type="image/jpg">

    <meta charset="UTF-8">
    <title>花少论坛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000010;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 星空画布铺满全屏 */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* 星光链接样式 */
        .star-link {
            position: relative;
            z-index: 99;
            font-size: 48px;
            font-weight: bold;
            font-family: "Microsoft Yahei", sans-serif;
            text-decoration: none;
            /* 渐变文字 */
            background: linear-gradient(90deg, #00f0ff, #ff00ff, #ffff00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: textShine 3s linear infinite;
            text-shadow: 0 0 15px rgba(0, 220, 255, 0.6);
            padding: 12px 40px;
            transition: all 0.4s ease;
        }
        /* 链接悬浮特效 */
        .star-link:hover {
            font-size: 52px;
            text-shadow: 0 0 30px #00e5ff, 0 0 60px #ff2ed8;
            filter: brightness(1.4);
        }
        /* 文字流光动画 */
        @keyframes textShine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
    </style>
</head>
<body>
    <!-- 星空粒子画布 -->
    <canvas id="starCanvas"></canvas>
    <!-- 你的推广链接，修改href更换网址 -->
    <a href="https://lt.huashao.dpdns.org/" target="_blank" class="star-link">
        ✨ 点击进入花少论坛 ✨
    </a>

    <script>
        // 星空粒子效果
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        // 适配屏幕尺寸
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 星光粒子类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = Math.random() * 2 + 0.3;
                this.opacity = Math.random();
                this.speed = Math.random() * 0.02 + 0.005;
                this.blinkDir = Math.random() > 0.5 ? 1 : -1;
            }
            // 闪烁动画
            update() {
                this.opacity += this.speed * this.blinkDir;
                if (this.opacity >= 1) this.blinkDir = -1;
                if (this.opacity <= 0) this.blinkDir = 1;
            }
            // 绘制星光
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.fill();
                // 外层光晕
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200,230,255,${this.opacity * 0.3})`;
                ctx.fill();
            }
        }

        // 生成600颗星光粒子
        function createStars() {
            stars = [];
            for (let i = 0; i < 600; i++) {
                stars.push(new Star());
            }
        }
        createStars();

        // 循环渲染星空
        function render() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(render);
        }
        render();
    </script>
</body>
</html>
